<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Remote Control</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; }
      body { max-width: 900px; margin: 0 auto; padding: 24px; background: #111; color: #eee; }
      label { display: block; margin: 16px 0 6px; font-weight: 600; }
      input, textarea, button { box-sizing: border-box; width: 100%; padding: 12px; font: inherit; }
      input, textarea { background: #1d1d1d; color: #fff; border: 1px solid #555; border-radius: 6px; }
      textarea { min-height: 180px; resize: vertical; }
      button { margin-top: 12px; border: 0; border-radius: 6px; background: #e7e7e7; color: #111; font-weight: 700; }
      button:disabled { opacity: .5; }
      #cancel { background: #7f1d1d; color: #fff; }
      [hidden] { display: none; }
      #status { margin: 16px 0; }
      pre { min-height: 220px; padding: 16px; overflow: auto; white-space: pre-wrap; background: #050505; border: 1px solid #333; }
      .warning { color: #ffcf66; }
    </style>
  </head>
  <body>
    <h1>Codex Remote Control</h1>
    <p class="warning">Anyone with this token can instruct Codex to edit files and run permitted commands on this server.</p>
    <form id="form">
      <label for="token">Bearer token</label>
      <input id="token" type="password" autocomplete="current-password" required>
      <label for="prompt">Prompt</label>
      <textarea id="prompt" required placeholder="Describe the work Codex should perform in /root/personal"></textarea>
      <button id="run" type="submit">Run Codex</button>
      <button id="cancel" type="button" hidden>Cancel job</button>
    </form>
    <div id="status">Idle</div>
    <pre id="output"></pre>
    <script>
      const form = document.querySelector("#form");
      const token = document.querySelector("#token");
      const prompt = document.querySelector("#prompt");
      const run = document.querySelector("#run");
      const cancel = document.querySelector("#cancel");
      const status = document.querySelector("#status");
      const output = document.querySelector("#output");
      let activeJobId;
      token.value = localStorage.getItem("codexRemoteToken") || "";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        localStorage.setItem("codexRemoteToken", token.value);
        run.disabled = true;
        output.textContent = "";
        status.textContent = "Starting...";

        try {
          const response = await fetch("/api/jobs", {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${token.value}`,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: prompt.value })
          });
          const job = await response.json();
          if (!response.ok) throw new Error(job.error || "Request failed");
          activeJobId = job.id;
          cancel.hidden = false;
          status.textContent = `Running job ${job.id}`;
          await watchJob(job.id);
        } catch (error) {
          status.textContent = error.message;
        } finally {
          activeJobId = undefined;
          cancel.hidden = true;
          run.disabled = false;
        }
      });

      cancel.addEventListener("click", async () => {
        if (!activeJobId) return;
        cancel.disabled = true;
        try {
          const response = await fetch(`/api/jobs/${activeJobId}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${token.value}` }
          });
          if (!response.ok) throw new Error("Could not cancel job");
          status.textContent = `Cancelling job ${activeJobId}`;
        } catch (error) {
          status.textContent = error.message;
        } finally {
          cancel.disabled = false;
        }
      });

      async function watchJob(id) {
        // EventSource cannot set an Authorization header, so use a streamed fetch.
        const response = await fetch(`/api/jobs/${id}/events`, {
          headers: { "Authorization": `Bearer ${token.value}` }
        });
        if (!response.ok || !response.body) throw new Error("Could not stream job output");

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const messages = buffer.split("\n\n");
          buffer = messages.pop() || "";
          for (const message of messages) {
            const line = message.split("\n").find((part) => part.startsWith("data: "));
            if (!line) continue;
            const event = JSON.parse(line.slice(6));
            output.textContent += event.data;
            output.scrollTop = output.scrollHeight;
          }

          const jobResponse = await fetch(`/api/jobs/${id}`, {
            headers: { "Authorization": `Bearer ${token.value}` }
          });
          const job = await jobResponse.json();
          status.textContent = `${job.status} job ${id}`;
          if (job.status !== "running") {
            if (job.status !== "cancelling") return;
          }
        }
      }
    </script>
  </body>
</html>
